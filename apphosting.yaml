# Firebase App Hosting — Runtime Configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  runtime: nodejs20
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  timeoutSeconds: 60

